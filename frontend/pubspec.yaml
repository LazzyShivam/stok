name: stok
description: Stok - Native Chat Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.4.2

  # WebSocket / Socket.io
  socket_io_client: ^2.0.3+1

  # WebRTC for video/voice
  flutter_webrtc: ^1.4.1

  # Voice recording
  record: ^6.0.0
  just_audio: ^0.9.39

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Image & Media
  image_picker: ^1.0.7
  file_picker: ^8.0.3
  cached_network_image: ^3.3.1
  video_player: ^2.8.4

  # Permissions
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.1.2

  # UI components
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  emoji_picker_flutter: ^2.1.0

  # Date & time
  intl: ^0.19.0
  timeago: ^3.6.1

  # Utils
  uuid: ^4.3.3
  path_provider: ^2.1.3
  url_launcher: ^6.2.6
  connectivity_plus: ^6.0.3

  # Phone number input
  intl_phone_field: ^3.2.0

  # Contacts
  flutter_contacts: ^1.1.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
