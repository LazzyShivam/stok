version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stok_postgres
    restart: always
    environment:
      POSTGRES_USER: stok_user
      POSTGRES_PASSWORD: stok_password
      POSTGRES_DB: stok_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U stok_user -d stok_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stok_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stok_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://stok_user:stok_password@postgres:5432/stok_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your_super_secret_jwt_key_change_in_production
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  uploads:
